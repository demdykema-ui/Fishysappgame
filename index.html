<html lang="en">
<head>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7676862797491915" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111827;
      font-family: Arial, sans-serif;
      color: white;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      text-align: center;
      position: relative;
    }
    canvas {
      background: linear-gradient(#7dd3fc, #bae6fd 70%, #86efac 70%, #4ade80);
      border: 4px solid #0f172a;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: block;
    }
    #install-btn {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.5);
    }
    #install-btn:active { background: #2563eb; }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="400" height="600"></canvas>
  </div>
  <button id="install-btn">Install App</button>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const game = {
      width: canvas.width,
      height: canvas.height,
      gravity: 0.45,
      flapStrength: -7.5,
      started: false,
      over: false,
      paused: false,
      score: 0,
      bestScore: 0,
      pipeGap: 170,
      pipeWidth: 70,
      pipeSpeed: 2.6,
      spawnTimer: 0,
      spawnInterval: 95,
      flashTimer: 0,
      difficultyLevel: 1,
      groundHeight: 30,
      levelUpTimer: 0,
      musicOn: true
    };

    try {
      const saved = localStorage.getItem('soccerFlappy_bestScore');
      if (saved) game.bestScore = parseInt(saved, 10) || 0;
    } catch (e) {}

    const bird = {
      x: 100, y: 260, radius: 18, velocityY: 0, rotation: 0
    };

    const pipes = [];

    const clouds = [
      { x: 40, y: 90, w: 70, speed: 0.25 },
      { x: 220, y: 140, w: 90, speed: 0.18 },
      { x: 330, y: 70, w: 65, speed: 0.22 }
    ];

    let audioCtx = null;
    let lastTime = 0;

    // ---- Music system ----
    let musicPlaying = false;
    let musicNodes = [];
    let musicInterval = null;

    // Upbeat soccer-style melody (note, octave, duration in 16th notes)
    const melody = [
      // Bar 1 - catchy opener
      ['E', 5, 2], ['G', 5, 2], ['A', 5, 2], ['B', 5, 2],
      ['A', 5, 2], ['G', 5, 2], ['E', 5, 4],
      // Bar 2
      ['D', 5, 2], ['E', 5, 2], ['G', 5, 4], ['E', 5, 2], ['D', 5, 2],
      ['C', 5, 4],
      // Bar 3 - build up
      ['C', 5, 2], ['D', 5, 2], ['E', 5, 2], ['G', 5, 2],
      ['A', 5, 4], ['G', 5, 2], ['E', 5, 2],
      // Bar 4 - resolution
      ['D', 5, 2], ['E', 5, 2], ['D', 5, 2], ['C', 5, 2],
      ['C', 5, 4], [null, 0, 4],
      // Bar 5 - high energy
      ['E', 5, 1], ['E', 5, 1], ['G', 5, 2], ['A', 5, 2], ['B', 5, 2],
      ['A', 5, 2], ['G', 5, 2], ['A', 5, 4],
      // Bar 6
      ['G', 5, 2], ['E', 5, 2], ['D', 5, 2], ['E', 5, 2],
      ['G', 5, 4], [null, 0, 4],
      // Bar 7 - variation
      ['A', 5, 2], ['B', 5, 2], ['C', 6, 4], ['B', 5, 2], ['A', 5, 2],
      ['G', 5, 4],
      // Bar 8 - ending
      ['E', 5, 2], ['G', 5, 2], ['E', 5, 2], ['D', 5, 2],
      ['C', 5, 4], [null, 0, 4],
    ];

    const bassLine = [
      ['C', 3, 8], ['G', 3, 8],
      ['A', 2, 8], ['E', 3, 8],
      ['F', 3, 8], ['C', 3, 8],
      ['G', 2, 8], ['G', 3, 8],
      ['C', 3, 8], ['G', 3, 8],
      ['A', 2, 8], ['E', 3, 8],
      ['F', 3, 8], ['G', 3, 8],
      ['C', 3, 8], ['C', 3, 8],
    ];

    const noteFreqs = {
      'C': 261.63, 'D': 293.66, 'E': 329.63, 'F': 349.23,
      'G': 392.00, 'A': 440.00, 'B': 493.88
    };

    function noteToFreq(note, octave) {
      if (!note) return 0;
      return noteFreqs[note] * Math.pow(2, octave - 4);
    }

    function playMusicNote(freq, duration, type, volume, startTime) {
      if (!audioCtx || freq === 0) return null;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume, startTime);
      gain.gain.setValueAtTime(volume, startTime + duration * 0.7);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.01);
      return osc;
    }

    function scheduleMusic() {
      if (!audioCtx || !game.musicOn) return 4;

      const bpm = 140;
      const sixteenth = 60 / bpm / 4;
      const startTime = audioCtx.currentTime + 0.05;

      // Schedule melody — louder and clear
      let melodyTime = startTime;
      for (const [note, oct, dur] of melody) {
        const freq = noteToFreq(note, oct);
        if (freq > 0) {
          playMusicNote(freq, sixteenth * dur * 0.9, 'square', 0.07, melodyTime);
        }
        melodyTime += sixteenth * dur;
      }

      // Schedule bass — solid and warm
      let bassTime = startTime;
      for (const [note, oct, dur] of bassLine) {
        const freq = noteToFreq(note, oct);
        if (freq > 0) {
          playMusicNote(freq, sixteenth * dur * 0.8, 'triangle', 0.09, bassTime);
        }
        bassTime += sixteenth * dur;
      }

      // Schedule percussion across full melody length
      const totalSixteenths = Math.ceil((melodyTime - startTime) / sixteenth);
      for (let i = 0; i < totalSixteenths; i++) {
        const t = startTime + i * sixteenth;
        // Kick on beats 1 and 3 of each bar
        if (i % 8 === 0 || i % 8 === 4) {
          playPercussion(t, 'kick');
        }
        // Hihat on every other 16th
        if (i % 2 === 0) {
          playPercussion(t, 'hihat');
        }
      }

      return melodyTime - startTime;
    }

    function playPercussion(time, type) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      if (type === 'kick') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, time);
        osc.frequency.exponentialRampToValueAtTime(30, time + 0.08);
        gain.gain.setValueAtTime(0.12, time);
        gain.gain.linearRampToValueAtTime(0, time + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.12);
      } else {
        osc.type = 'square';
        osc.frequency.value = 6000 + Math.random() * 2000;
        gain.gain.setValueAtTime(0.03, time);
        gain.gain.linearRampToValueAtTime(0, time + 0.03);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.05);
      }
    }

    function startMusic() {
      if (musicPlaying || !game.musicOn) return;
      musicPlaying = true;

      function loop() {
        if (!musicPlaying || !game.musicOn) return;
        const dur = scheduleMusic();
        // Schedule next loop slightly before current one ends for seamless playback
        musicInterval = setTimeout(loop, dur * 1000 - 200);
      }
      loop();
    }

    function stopMusic() {
      musicPlaying = false;
      if (musicInterval) {
        clearTimeout(musicInterval);
        musicInterval = null;
      }
    }

    function toggleMusic() {
      game.musicOn = !game.musicOn;
      if (game.musicOn && game.started && !game.over) {
        startMusic();
      } else {
        stopMusic();
      }
    }

    // ---- Canvas scaling ----
    function resizeCanvas() {
      const maxW = window.innerWidth;
      const maxH = window.innerHeight;
      const aspect = 400 / 600;
      let w = maxW;
      let h = w / aspect;
      if (h > maxH) {
        h = maxH;
        w = h * aspect;
      }
      canvas.style.width = Math.floor(w) + 'px';
      canvas.style.height = Math.floor(h) + 'px';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function resetGame() {
      bird.x = 100;
      bird.y = 260;
      bird.velocityY = 0;
      bird.rotation = 0;
      game.started = false;
      game.over = false;
      game.paused = false;
      game.score = 0;
      game.pipeGap = 170;
      game.pipeSpeed = 2.6;
      game.spawnInterval = 95;
      game.spawnTimer = 0;
      game.flashTimer = 0;
      game.levelUpTimer = 0;
      game.difficultyLevel = 1;
      pipes.length = 0;
      stopMusic();
    }

    function initAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playTone(freq, duration, type = 'sine', volume = 0.03) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function togglePause() {
      if (!game.started || game.over) return;
      game.paused = !game.paused;
      if (game.paused) {
        stopMusic();
      } else if (game.musicOn) {
        startMusic();
      }
    }

    function flap() {
      initAudio();
      if (game.paused) return;
      if (game.over) {
        resetGame();
        return;
      }
      if (!game.started) {
        game.started = true;
        if (game.musicOn) startMusic();
      }
      bird.velocityY = game.flapStrength;
      playTone(560, 0.06, 'square', 0.025);
    }

    function createPipe() {
      const minTop = 80;
      const maxTop = game.height - game.groundHeight - game.pipeGap - 80;
      const topHeight = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;
      pipes.push({
        x: game.width + 20,
        width: game.pipeWidth,
        topHeight,
        bottomY: topHeight + game.pipeGap,
        passed: false
      });
    }

    function saveBestScore() {
      try { localStorage.setItem('soccerFlappy_bestScore', game.bestScore); } catch (e) {}
    }

    function increaseDifficulty() {
      const level = 1 + Math.floor(game.score / 5);
      if (level !== game.difficultyLevel) {
        game.difficultyLevel = level;
        game.pipeSpeed = Math.min(4.8, 2.6 + (level - 1) * 0.25);
        game.pipeGap = Math.max(130, 170 - (level - 1) * 6);
        game.spawnInterval = Math.max(72, 95 - (level - 1) * 3);
        game.levelUpTimer = 60;
        playTone(760, 0.08, 'triangle', 0.03);
      }
    }

    function circleRectCollision(cx, cy, radius, rx, ry, rw, rh) {
      const closestX = Math.max(rx, Math.min(cx, rx + rw));
      const closestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - closestX;
      const dy = cy - closestY;
      return (dx * dx + dy * dy) < radius * radius;
    }

    function update(dt) {
      clouds.forEach((cloud) => {
        cloud.x -= cloud.speed * dt;
        if (cloud.x + cloud.w < 0) cloud.x = game.width + 20;
      });

      if (game.flashTimer > 0) game.flashTimer -= dt;
      if (game.levelUpTimer > 0) game.levelUpTimer -= dt;
      if (!game.started || game.over || game.paused) return;

      bird.velocityY += game.gravity * dt;
      bird.y += bird.velocityY * dt;
      bird.rotation = Math.max(-0.5, Math.min(1, bird.velocityY * 0.08));

      game.spawnTimer += dt;
      if (game.spawnTimer >= game.spawnInterval) {
        createPipe();
        game.spawnTimer = 0;
      }

      for (let i = pipes.length - 1; i >= 0; i--) {
        const pipe = pipes[i];
        pipe.x -= game.pipeSpeed * dt;

        if (!pipe.passed && pipe.x + pipe.width < bird.x) {
          pipe.passed = true;
          game.score += 1;
          game.bestScore = Math.max(game.bestScore, game.score);
          saveBestScore();
          game.flashTimer = 5;
          playTone(820, 0.05, 'triangle', 0.028);
          increaseDifficulty();
        }

        const hitTop = circleRectCollision(bird.x, bird.y, bird.radius, pipe.x, 0, pipe.width, pipe.topHeight);
        const hitBottom = circleRectCollision(bird.x, bird.y, bird.radius, pipe.x, pipe.bottomY, pipe.width, game.height - game.groundHeight - pipe.bottomY);

        if (hitTop || hitBottom) {
          game.over = true;
          stopMusic();
          playTone(180, 0.14, 'sawtooth', 0.04);
        }

        if (pipe.x + pipe.width < -20) pipes.splice(i, 1);
      }

      if (bird.y + bird.radius > game.height - game.groundHeight) {
        bird.y = game.height - game.groundHeight - bird.radius;
        game.over = true;
        stopMusic();
        playTone(180, 0.14, 'sawtooth', 0.04);
      }

      if (bird.y - bird.radius < 0) {
        bird.y = bird.radius;
        bird.velocityY = 0;
      }
    }

    // ---- Drawing functions ----

    function drawBackground() {
      const skyGrad = ctx.createLinearGradient(0, 0, 0, game.height * 0.7);
      skyGrad.addColorStop(0, '#7dd3fc');
      skyGrad.addColorStop(1, '#bae6fd');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, game.width, game.height * 0.7);

      const groundGrad = ctx.createLinearGradient(0, game.height * 0.7, 0, game.height);
      groundGrad.addColorStop(0, '#86efac');
      groundGrad.addColorStop(1, '#4ade80');
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, game.height * 0.7, game.width, game.height * 0.3);

      ctx.fillStyle = '#65a30d';
      ctx.fillRect(0, game.height - game.groundHeight, game.width, game.groundHeight);
      ctx.fillStyle = '#4d7c0f';
      ctx.fillRect(0, game.height - game.groundHeight, game.width, 4);
    }

    function drawClouds() {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      clouds.forEach((cloud) => {
        ctx.beginPath();
        ctx.ellipse(cloud.x, cloud.y, cloud.w * 0.5, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cloud.x - cloud.w * 0.25, cloud.y + 6, cloud.w * 0.3, 14, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cloud.x + cloud.w * 0.25, cloud.y + 4, cloud.w * 0.35, 16, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawPipe(pipe) {
      const pipeGrad = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipe.width, 0);
      pipeGrad.addColorStop(0, '#ffffff');
      pipeGrad.addColorStop(0.2, '#e2e8f0');
      pipeGrad.addColorStop(0.8, '#cbd5e1');
      pipeGrad.addColorStop(1, '#94a3b8');
      ctx.fillStyle = pipeGrad;

      ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
      ctx.fillStyle = '#f1f5f9';
      ctx.fillRect(pipe.x - 6, pipe.topHeight - 20, pipe.width + 12, 20);
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 2;
      ctx.strokeRect(pipe.x - 6, pipe.topHeight - 20, pipe.width + 12, 20);

      ctx.strokeStyle = 'rgba(148, 163, 184, 0.3)';
      ctx.lineWidth = 1;
      for (let ny = 0; ny < pipe.topHeight - 20; ny += 15) {
        ctx.beginPath(); ctx.moveTo(pipe.x, ny); ctx.lineTo(pipe.x + pipe.width, ny); ctx.stroke();
      }
      for (let nx = pipe.x; nx < pipe.x + pipe.width; nx += 15) {
        ctx.beginPath(); ctx.moveTo(nx, 0); ctx.lineTo(nx, pipe.topHeight - 20); ctx.stroke();
      }

      ctx.fillStyle = pipeGrad;
      ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, game.height - game.groundHeight - pipe.bottomY);
      ctx.fillStyle = '#f1f5f9';
      ctx.fillRect(pipe.x - 6, pipe.bottomY, pipe.width + 12, 20);
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 2;
      ctx.strokeRect(pipe.x - 6, pipe.bottomY, pipe.width + 12, 20);

      ctx.strokeStyle = 'rgba(148, 163, 184, 0.3)';
      ctx.lineWidth = 1;
      for (let ny = pipe.bottomY + 20; ny < game.height - game.groundHeight; ny += 15) {
        ctx.beginPath(); ctx.moveTo(pipe.x, ny); ctx.lineTo(pipe.x + pipe.width, ny); ctx.stroke();
      }
      for (let nx = pipe.x; nx < pipe.x + pipe.width; nx += 15) {
        ctx.beginPath(); ctx.moveTo(nx, pipe.bottomY + 20); ctx.lineTo(nx, game.height - game.groundHeight); ctx.stroke();
      }
    }

    function drawBird() {
      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(bird.rotation);

      ctx.beginPath();
      ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = '#374151';
      ctx.lineWidth = 2;
      ctx.stroke();

      const r = bird.radius * 0.45;
      ctx.fillStyle = '#1f2937';
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
        const px = Math.cos(angle) * r;
        const py = Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();

      for (let i = 0; i < 5; i++) {
        const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
        const cx2 = Math.cos(angle) * bird.radius * 0.78;
        const cy2 = Math.sin(angle) * bird.radius * 0.78;
        ctx.beginPath();
        ctx.arc(cx2, cy2, bird.radius * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(31, 41, 55, 0.15)';
        ctx.fill();
      }

      ctx.restore();
    }

    function drawMusicToggle() {
      // Music icon top-left
      const x = 12, y = 18;
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#ffffff';
      ctx.font = '20px Arial';
      ctx.textAlign = 'left';
      ctx.fillText(game.musicOn ? '\u266B' : '\u266B', x, y + 16);
      if (!game.musicOn) {
        // Draw strikethrough
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x - 2, y + 20);
        ctx.lineTo(x + 20, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawScore() {
      if (game.flashTimer > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(game.flashTimer, 5) * 0.06})`;
        ctx.fillRect(0, 0, game.width, game.height);
      }

      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = '#0f172a';
      ctx.lineWidth = 4;
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.strokeText(game.score, game.width / 2, 60);
      ctx.fillText(game.score, game.width / 2, 60);

      if (game.difficultyLevel > 1) {
        ctx.font = 'bold 16px Arial';
        ctx.fillStyle = '#fbbf24';
        ctx.strokeStyle = '#0f172a';
        ctx.lineWidth = 3;
        ctx.strokeText('Level ' + game.difficultyLevel, game.width / 2, 85);
        ctx.fillText('Level ' + game.difficultyLevel, game.width / 2, 85);
      }

      if (game.levelUpTimer > 0) {
        const alpha = Math.min(game.levelUpTimer / 30, 1);
        const scale = 1 + (1 - alpha) * 0.3;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(game.width / 2, 140);
        ctx.scale(scale, scale);
        ctx.font = 'bold 28px Arial';
        ctx.fillStyle = '#fbbf24';
        ctx.strokeStyle = '#0f172a';
        ctx.lineWidth = 3;
        ctx.strokeText('LEVEL UP!', 0, 0);
        ctx.fillText('LEVEL UP!', 0, 0);
        ctx.restore();
      }

      ctx.restore();
    }

    function drawPauseButton() {
      if (!game.started || game.over) return;
      const bx = game.width - 40, by = 15;
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(bx, by, 8, 22);
      ctx.fillRect(bx + 14, by, 8, 22);
      ctx.restore();
    }

    function drawPauseOverlay() {
      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.fillRect(0, 0, game.width, game.height);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 40px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', game.width / 2, game.height / 2 - 20);

      ctx.font = '20px Arial';
      ctx.fillStyle = '#e2e8f0';
      ctx.fillText('Tap or press P to resume', game.width / 2, game.height / 2 + 25);
      ctx.restore();
    }

    function drawStartScreen() {
      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      ctx.fillRect(0, 0, game.width, game.height);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 38px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Soccer Flappy', game.width / 2, 190);

      ctx.font = '16px Arial';
      ctx.fillStyle = '#94a3b8';
      ctx.fillText('A soccer-themed flappy game', game.width / 2, 220);

      ctx.font = '22px Arial';
      ctx.fillStyle = '#e2e8f0';
      ctx.fillText('Tap or press Space to play', game.width / 2, 270);

      if (game.bestScore > 0) {
        ctx.font = 'bold 18px Arial';
        ctx.fillStyle = '#fbbf24';
        ctx.fillText('Best: ' + game.bestScore, game.width / 2, 305);
      }

      // Controls info
      ctx.font = '14px Arial';
      ctx.fillStyle = '#94a3b8';
      ctx.fillText('P = Pause  |  M = Music On/Off', game.width / 2, game.height - 60);

      // Bouncing ball
      const bounce = Math.sin(Date.now() * 0.004) * 15;
      ctx.beginPath();
      ctx.arc(game.width / 2, 380 + bounce, 24, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = '#374151';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = '#1f2937';
      ctx.beginPath();
      const sr = 10;
      for (let i = 0; i < 5; i++) {
        const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
        const px = game.width / 2 + Math.cos(angle) * sr;
        const py = 380 + bounce + Math.sin(angle) * sr;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawGameOver() {
      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, game.width, game.height);

      ctx.fillStyle = '#ef4444';
      ctx.font = 'bold 40px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over!', game.width / 2, 220);

      ctx.fillStyle = '#ffffff';
      ctx.font = '24px Arial';
      ctx.fillText('Score: ' + game.score, game.width / 2, 280);

      ctx.fillStyle = '#fbbf24';
      ctx.font = '20px Arial';
      ctx.fillText('Best: ' + game.bestScore, game.width / 2, 320);

      ctx.fillStyle = '#e2e8f0';
      ctx.font = '18px Arial';
      ctx.fillText('Tap or press Space to retry', game.width / 2, 380);

      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, game.width, game.height);
      drawBackground();
      drawClouds();
      pipes.forEach(drawPipe);
      drawBird();

      if (game.started) {
        drawScore();
        drawPauseButton();
        drawMusicToggle();
      }

      if (!game.started && !game.over) drawStartScreen();
      if (game.over) drawGameOver();
      if (game.paused) drawPauseOverlay();
    }

    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 16.667;
      lastTime = timestamp;
      if (dt > 3) dt = 0;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ---- Input handlers ----

    function isPauseButtonHit(x, y) {
      return x >= game.width - 50 && x <= game.width - 10 && y >= 10 && y <= 45;
    }

    function isMusicButtonHit(x, y) {
      return x >= 5 && x <= 40 && y >= 10 && y <= 45;
    }

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = game.width / rect.width;
      const scaleY = game.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;

      if (game.started && !game.over) {
        if (isPauseButtonHit(x, y)) { togglePause(); return; }
        if (isMusicButtonHit(x, y)) { toggleMusic(); return; }
      }
      if (game.paused) { togglePause(); return; }
      flap();
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        flap();
      }
      if (e.code === 'KeyP' || e.code === 'Escape') {
        e.preventDefault();
        togglePause();
      }
      if (e.code === 'KeyM') {
        e.preventDefault();
        toggleMusic();
      }
    });

    // Tab visibility
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (game.started && !game.over && !game.paused) {
          game.paused = true;
          stopMusic();
        }
      }
      lastTime = 0;
    });

    // ---- PWA Install prompt ----
    let deferredPrompt = null;
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        installBtn.style.display = 'none';
      });
    });

    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      deferredPrompt = null;
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Start
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
