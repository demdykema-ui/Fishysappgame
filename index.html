<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Soccer Flappy Clone</title>
  <meta name="description" content="Kick the soccer ball through the goal posts! A fun, soccer-themed Flappy Bird clone you can play in your browser." />
  <meta name="theme-color" content="#111827" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%9A%BD</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <meta property="og:title" content="Soccer Flappy Clone" />
  <meta property="og:description" content="Kick the soccer ball through the goal posts! A soccer-themed Flappy Bird clone." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://demdykema-ui.github.io/Fishysappgame/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Soccer Flappy Clone" />
  <meta name="twitter:description" content="Kick the soccer ball through the goal posts!" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }
    .wrap {
      text-align: center;
    }
    canvas {
      background: linear-gradient(#7dd3fc, #bae6fd 70%, #86efac 70%, #4ade80);
      border: 4px solid #0f172a;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .hint {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="400" height="600"></canvas>
    <div class="hint">Tap, click, or press Space to kick the ball upward</div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const game = {
      width: canvas.width,
      height: canvas.height,
      gravity: 0.45,
      flapStrength: -7.5,
      started: false,
      over: false,
      paused: false,
      score: 0,
      bestScore: 0,
      pipeGap: 170,
      pipeWidth: 70,
      pipeSpeed: 2.6,
      spawnTimer: 0,
      spawnInterval: 95,
      flashTimer: 0,
      difficultyLevel: 1,
      groundHeight: 30,
      levelUpTimer: 0
    };

    // Load best score from localStorage
    try {
      const saved = localStorage.getItem('soccerFlappy_bestScore');
      if (saved) game.bestScore = parseInt(saved, 10) || 0;
    } catch (e) {}

    const bird = {
      x: 100,
      y: 260,
      radius: 18,
      velocityY: 0,
      rotation: 0
    };

    const pipes = [];

    const clouds = [
      { x: 40, y: 90, w: 70, speed: 0.25 },
      { x: 220, y: 140, w: 90, speed: 0.18 },
      { x: 330, y: 70, w: 65, speed: 0.22 }
    ];

    let audioCtx = null;
    let lastTime = 0;

    // ---- Canvas scaling for mobile ----
    function resizeCanvas() {
      const maxW = window.innerWidth - 16;
      const maxH = window.innerHeight - 60;
      const aspect = 400 / 600;
      let w = maxW;
      let h = w / aspect;
      if (h > maxH) {
        h = maxH;
        w = h * aspect;
      }
      canvas.style.width = Math.floor(w) + 'px';
      canvas.style.height = Math.floor(h) + 'px';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function resetGame() {
      bird.x = 100;
      bird.y = 260;
      bird.velocityY = 0;
      bird.rotation = 0;
      game.started = false;
      game.over = false;
      game.paused = false;
      game.score = 0;
      game.pipeGap = 170;
      game.pipeSpeed = 2.6;
      game.spawnInterval = 95;
      game.spawnTimer = 0;
      game.flashTimer = 0;
      game.levelUpTimer = 0;
      game.difficultyLevel = 1;
      pipes.length = 0;
    }

    function initAudio() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) audioCtx = new AudioContextClass();
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playTone(freq, duration, type = 'sine', volume = 0.03) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function togglePause() {
      if (!game.started || game.over) return;
      game.paused = !game.paused;
    }

    function flap() {
      initAudio();
      if (game.paused) return;
      if (game.over) {
        resetGame();
        return;
      }
      game.started = true;
      bird.velocityY = game.flapStrength;
      playTone(560, 0.06, 'square', 0.025);
    }

    function createPipe() {
      const minTop = 80;
      const maxTop = game.height - game.groundHeight - game.pipeGap - 80;
      const topHeight = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;

      pipes.push({
        x: game.width + 20,
        width: game.pipeWidth,
        topHeight,
        bottomY: topHeight + game.pipeGap,
        passed: false
      });
    }

    function saveBestScore() {
      try {
        localStorage.setItem('soccerFlappy_bestScore', game.bestScore);
      } catch (e) {}
    }

    function increaseDifficulty() {
      const level = 1 + Math.floor(game.score / 5);
      if (level !== game.difficultyLevel) {
        game.difficultyLevel = level;
        game.pipeSpeed = Math.min(4.8, 2.6 + (level - 1) * 0.25);
        game.pipeGap = Math.max(130, 170 - (level - 1) * 6);
        game.spawnInterval = Math.max(72, 95 - (level - 1) * 3);
        game.levelUpTimer = 60;
        playTone(760, 0.08, 'triangle', 0.03);
      }
    }

    function circleRectCollision(cx, cy, radius, rx, ry, rw, rh) {
      const closestX = Math.max(rx, Math.min(cx, rx + rw));
      const closestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - closestX;
      const dy = cy - closestY;
      return (dx * dx + dy * dy) < radius * radius;
    }

    function update(dt) {
      // Animate clouds always
      clouds.forEach((cloud) => {
        cloud.x -= cloud.speed * dt;
        if (cloud.x + cloud.w < 0) {
          cloud.x = game.width + 20;
        }
      });

      if (game.flashTimer > 0) game.flashTimer -= dt;
      if (game.levelUpTimer > 0) game.levelUpTimer -= dt;
      if (!game.started || game.over || game.paused) return;

      // Bird physics
      bird.velocityY += game.gravity * dt;
      bird.y += bird.velocityY * dt;
      bird.rotation = Math.max(-0.5, Math.min(1, bird.velocityY * 0.08));

      // Spawn pipes
      game.spawnTimer += dt;
      if (game.spawnTimer >= game.spawnInterval) {
        createPipe();
        game.spawnTimer = 0;
      }

      // Update pipes
      for (let i = pipes.length - 1; i >= 0; i--) {
        const pipe = pipes[i];
        pipe.x -= game.pipeSpeed * dt;

        if (!pipe.passed && pipe.x + pipe.width < bird.x) {
          pipe.passed = true;
          game.score += 1;
          game.bestScore = Math.max(game.bestScore, game.score);
          saveBestScore();
          game.flashTimer = 5;
          playTone(820, 0.05, 'triangle', 0.028);
          increaseDifficulty();
        }

        const hitTop = circleRectCollision(
          bird.x, bird.y, bird.radius,
          pipe.x, 0, pipe.width, pipe.topHeight
        );

        const hitBottom = circleRectCollision(
          bird.x, bird.y, bird.radius,
          pipe.x, pipe.bottomY, pipe.width, game.height - game.groundHeight - pipe.bottomY
        );

        if (hitTop || hitBottom) {
          game.over = true;
          playTone(180, 0.14, 'sawtooth', 0.04);
        }

        // Remove off-screen pipes
        if (pipe.x + pipe.width < -20) {
          pipes.splice(i, 1);
        }
      }

      // Ground and ceiling collision
      if (bird.y + bird.radius > game.height - game.groundHeight) {
        bird.y = game.height - game.groundHeight - bird.radius;
        game.over = true;
        playTone(180, 0.14, 'sawtooth', 0.04);
      }

      if (bird.y - bird.radius < 0) {
        bird.y = bird.radius;
        bird.velocityY = 0;
      }
    }

    // ---- Drawing functions ----

    function drawBackground() {
      const skyGrad = ctx.createLinearGradient(0, 0, 0, game.height * 0.7);
      skyGrad.addColorStop(0, '#7dd3fc');
      skyGrad.addColorStop(1, '#bae6fd');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, game.width, game.height * 0.7);

      const groundGrad = ctx.createLinearGradient(0, game.height * 0.7, 0, game.height);
      groundGrad.addColorStop(0, '#86efac');
      groundGrad.addColorStop(1, '#4ade80');
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, game.height * 0.7, game.width, game.height * 0.3);

      ctx.fillStyle = '#65a30d';
      ctx.fillRect(0, game.height - game.groundHeight, game.width, game.groundHeight);
      ctx.fillStyle = '#4d7c0f';
      ctx.fillRect(0, game.height - game.groundHeight, game.width, 4);
    }

    function drawClouds() {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      clouds.forEach((cloud) => {
        ctx.beginPath();
        ctx.ellipse(cloud.x, cloud.y, cloud.w * 0.5, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cloud.x - cloud.w * 0.25, cloud.y + 6, cloud.w * 0.3, 14, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cloud.x + cloud.w * 0.25, cloud.y + 4, cloud.w * 0.35, 16, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawPipe(pipe) {
      const pipeGrad = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipe.width, 0);
      pipeGrad.addColorStop(0, '#ffffff');
      pipeGrad.addColorStop(0.2, '#e2e8f0');
      pipeGrad.addColorStop(0.8, '#cbd5e1');
      pipeGrad.addColorStop(1, '#94a3b8');
      ctx.fillStyle = pipeGrad;

      // Top post
      ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
      ctx.fillStyle = '#f1f5f9';
      ctx.fillRect(pipe.x - 6, pipe.topHeight - 20, pipe.width + 12, 20);
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 2;
      ctx.strokeRect(pipe.x - 6, pipe.topHeight - 20, pipe.width + 12, 20);

      // Net pattern on top pipe
      ctx.strokeStyle = 'rgba(148, 163, 184, 0.3)';
      ctx.lineWidth = 1;
      for (let ny = 0; ny < pipe.topHeight - 20; ny += 15) {
        ctx.beginPath();
        ctx.moveTo(pipe.x, ny);
        ctx.lineTo(pipe.x + pipe.width, ny);
        ctx.stroke();
      }
      for (let nx = pipe.x; nx < pipe.x + pipe.width; nx += 15) {
        ctx.beginPath();
        ctx.moveTo(nx, 0);
        ctx.lineTo(nx, pipe.topHeight - 20);
        ctx.stroke();
      }

      // Bottom pipe
      ctx.fillStyle = pipeGrad;
      ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, game.height - game.groundHeight - pipe.bottomY);
      ctx.fillStyle = '#f1f5f9';
      ctx.fillRect(pipe.x - 6, pipe.bottomY, pipe.width + 12, 20);
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 2;
      ctx.strokeRect(pipe.x - 6, pipe.bottomY, pipe.width + 12, 20);

      // Net pattern on bottom pipe
      ctx.strokeStyle = 'rgba(148, 163, 184, 0.3)';
      ctx.lineWidth = 1;
      for (let ny = pipe.bottomY + 20; ny < game.height - game.groundHeight; ny += 15) {
        ctx.beginPath();
        ctx.moveTo(pipe.x, ny);
        ctx.lineTo(pipe.x + pipe.width, ny);
        ctx.stroke();
      }
      for (let nx = pipe.x; nx < pipe.x + pipe.width; nx += 15) {
        ctx.beginPath();
        ctx.moveTo(nx, pipe.bottomY + 20);
        ctx.lineTo(nx, game.height - game.groundHeight);
        ctx.stroke();
      }
    }

    function drawBird() {
      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(bird.rotation);

      ctx.beginPath();
      ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = '#374151';
      ctx.lineWidth = 2;
      ctx.stroke();

      const r = bird.radius * 0.45;
      ctx.fillStyle = '#1f2937';
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
        const px = Math.cos(angle) * r;
        const py = Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();

      for (let i = 0; i < 5; i++) {
        const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
        const cx2 = Math.cos(angle) * bird.radius * 0.78;
        const cy2 = Math.sin(angle) * bird.radius * 0.78;
        ctx.beginPath();
        ctx.arc(cx2, cy2, bird.radius * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(31, 41, 55, 0.15)';
        ctx.fill();
      }

      ctx.restore();
    }

    function drawScore() {
      // Score flash effect
      if (game.flashTimer > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(game.flashTimer, 5) * 0.06})`;
        ctx.fillRect(0, 0, game.width, game.height);
      }

      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = '#0f172a';
      ctx.lineWidth = 4;
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.strokeText(game.score, game.width / 2, 60);
      ctx.fillText(game.score, game.width / 2, 60);

      // Level indicator
      if (game.difficultyLevel > 1) {
        ctx.font = 'bold 16px Arial';
        ctx.fillStyle = '#fbbf24';
        ctx.strokeStyle = '#0f172a';
        ctx.lineWidth = 3;
        ctx.strokeText('Level ' + game.difficultyLevel, game.width / 2, 85);
        ctx.fillText('Level ' + game.difficultyLevel, game.width / 2, 85);
      }

      // Level up flash
      if (game.levelUpTimer > 0) {
        const alpha = Math.min(game.levelUpTimer / 30, 1);
        const scale = 1 + (1 - alpha) * 0.3;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(game.width / 2, 140);
        ctx.scale(scale, scale);
        ctx.font = 'bold 28px Arial';
        ctx.fillStyle = '#fbbf24';
        ctx.strokeStyle = '#0f172a';
        ctx.lineWidth = 3;
        ctx.strokeText('LEVEL UP!', 0, 0);
        ctx.fillText('LEVEL UP!', 0, 0);
        ctx.restore();
      }

      ctx.restore();
    }

    function drawPauseButton() {
      if (!game.started || game.over) return;
      // Pause icon in top-right
      const bx = game.width - 40;
      const by = 15;
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(bx, by, 8, 22);
      ctx.fillRect(bx + 14, by, 8, 22);
      ctx.restore();
    }

    function drawPauseOverlay() {
      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.fillRect(0, 0, game.width, game.height);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 40px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', game.width / 2, game.height / 2 - 20);

      ctx.font = '20px Arial';
      ctx.fillStyle = '#e2e8f0';
      ctx.fillText('Tap or press P to resume', game.width / 2, game.height / 2 + 25);
      ctx.restore();
    }

    function drawStartScreen() {
      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      ctx.fillRect(0, 0, game.width, game.height);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 36px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Soccer Flappy', game.width / 2, 200);

      ctx.font = '20px Arial';
      ctx.fillStyle = '#e2e8f0';
      ctx.fillText('Tap or press Space to play', game.width / 2, 260);

      if (game.bestScore > 0) {
        ctx.font = '18px Arial';
        ctx.fillStyle = '#fbbf24';
        ctx.fillText('Best: ' + game.bestScore, game.width / 2, 295);
      }

      // Bouncing ball animation
      const bounce = Math.sin(Date.now() * 0.004) * 15;
      ctx.beginPath();
      ctx.arc(game.width / 2, 360 + bounce, 24, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = '#374151';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = '#1f2937';
      ctx.beginPath();
      const sr = 10;
      for (let i = 0; i < 5; i++) {
        const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
        const px = game.width / 2 + Math.cos(angle) * sr;
        const py = 360 + bounce + Math.sin(angle) * sr;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawGameOver() {
      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, game.width, game.height);

      ctx.fillStyle = '#ef4444';
      ctx.font = 'bold 40px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over!', game.width / 2, 220);

      ctx.fillStyle = '#ffffff';
      ctx.font = '24px Arial';
      ctx.fillText('Score: ' + game.score, game.width / 2, 280);

      ctx.fillStyle = '#fbbf24';
      ctx.font = '20px Arial';
      ctx.fillText('Best: ' + game.bestScore, game.width / 2, 320);

      ctx.fillStyle = '#e2e8f0';
      ctx.font = '18px Arial';
      ctx.fillText('Tap or press Space to retry', game.width / 2, 380);

      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, game.width, game.height);

      drawBackground();
      drawClouds();
      pipes.forEach(drawPipe);
      drawBird();

      if (game.started) {
        drawScore();
        drawPauseButton();
      }

      if (!game.started && !game.over) {
        drawStartScreen();
      }

      if (game.over) {
        drawGameOver();
      }

      if (game.paused) {
        drawPauseOverlay();
      }
    }

    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 16.667; // normalize to 60fps
      lastTime = timestamp;

      // Cap dt to prevent huge jumps after tab switch
      if (dt > 3) dt = 0;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ---- Input handlers ----

    function isPauseButtonHit(x, y) {
      // Check if tap is in the pause button area (top-right)
      return x >= game.width - 50 && x <= game.width - 10 && y >= 10 && y <= 45;
    }

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = game.width / rect.width;
      const scaleY = game.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;

      if (game.started && !game.over && isPauseButtonHit(x, y)) {
        togglePause();
        return;
      }
      if (game.paused) {
        togglePause();
        return;
      }
      flap();
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        flap();
      }
      if (e.code === 'KeyP' || e.code === 'Escape') {
        e.preventDefault();
        togglePause();
      }
    });

    // Tab visibility: reset lastTime to avoid dt spike
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        // Auto-pause when tab is hidden
        if (game.started && !game.over && !game.paused) {
          game.paused = true;
        }
      }
      // Reset lastTime so dt doesn't spike when returning
      lastTime = 0;
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Start the game loop
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
